<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎞️ Animated Icon Exporter — Shadow Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b14;--surface:#15172a;--border:#2a2d4a;--text:#f1f3f7;--text-muted:#94a0b8;--primary:#7c4dff;--accent:#00e5ff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1300px;margin:0 auto;padding:40px}
.header{text-align:center;margin-bottom:36px}
.header h1{font-size:2.3rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#ff6b81,#7c4dff,#00e5ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-muted);font-size:1.05rem}

.studio{display:grid;grid-template-columns:320px 1fr;gap:24px}
.panel{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border)}
.panel h2{font-size:1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.panel h2 .ico{font-size:1.2rem}

/* Icon Canvas */
.icon-canvas-wrap{background:#111;border-radius:12px;border:1px solid var(--border);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;position:relative}
.icon-canvas-wrap canvas{image-rendering:pixelated;border-radius:8px}
.grid-overlay{position:absolute;pointer-events:none;opacity:.15}

/* Preview Animation */
.preview-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px}
.preview-cell{width:64px;height:64px;border:2px solid var(--border);border-radius:8px;overflow:hidden;position:relative;cursor:pointer;transition:all .2s}
.preview-cell:hover{border-color:var(--primary);transform:scale(1.1)}
.preview-cell canvas{width:100%;height:100%}

/* Controls */
.control-group{margin-bottom:16px}
.control-group label{display:block;font-size:.78rem;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.control-group input[type="range"]{width:100%;height:6px;-webkit-appearance:none;background:var(--border);border-radius:3px;outline:none}
.control-group input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--primary);border-radius:50%;cursor:pointer;box-shadow:0 0 6px rgba(124,77,255,.5)}
.control-group input[type="color"]{width:100%;height:36px;border:none;border-radius:8px;cursor:pointer;background:var(--bg)}
.control-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.val{text-align:right;font-size:.75rem;color:var(--accent);margin-top:2px;display:block}

.toolbar{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tool-btn{padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text-muted);cursor:pointer;font-size:.78rem;font-family:inherit;transition:all .2s}
.tool-btn:hover{border-color:var(--primary);color:var(--text);background:rgba(124,77,255,.08)}
.tool-btn.active{border-color:var(--primary);background:rgba(124,77,255,.15);color:var(--primary)}

.size-presets{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.size-btn{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text-muted);cursor:pointer;font-size:.72rem;font-family:inherit;transition:all .2s}
.size-btn:hover{border-color:var(--primary);color:var(--text)}
.size-btn.active{border-color:var(--primary);background:rgba(124,77,255,.15);color:var(--primary)}

/* Animation Player */
.player-controls{display:flex;gap:8px;align-items:center;margin:16px 0;flex-wrap:wrap}
.player-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.player-btn:hover{border-color:var(--primary);background:rgba(124,77,255,.1)}
.player-btn.playing{border-color:var(--accent);background:rgba(0,229,255,.15);color:var(--accent)}
.player-btn.stop{border-color:var(--error);color:var(--error)}

.timeline{display:flex;gap:2px;margin:12px 0;align-items:center}
.timeline-bar{flex:1;height:6px;background:var(--border);border-radius:3px;position:relative;cursor:pointer;overflow:hidden}
.timeline-progress{height:100%;background:var(--primary);border-radius:3px;transition:width .1s;min-width:4px}
.frame-indicator{font-size:.7rem;color:var(--accent);min-width:50px;text-align:right}

/* Buttons */
.btn{padding:11px 20px;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-size:.82rem;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#7c4dff,#9c6bff);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,77,255,.3)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary)}
.btn-danger{background:linear-gradient(135deg,#ff6b81,#ef4444);color:#fff}
.btn-accent{background:linear-gradient(135deg,#00e5ff,#22d3ee);color:#0a0b14;font-weight:700}
.btn-accent:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,229,255,.3)}
.btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}

/* Code Block */
.code-block{background:#0c0e18;border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'Fira Code',monospace;font-size:.72rem;color:#a0a8c0;white-space:pre-wrap;overflow-x:auto;max-height:160px;overflow-y:auto;margin-top:12px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--primary);border-radius:10px;padding:12px 20px;font-size:.85rem;z-index:100000;opacity:0;transform:translateY(20px);transition:all .3s;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:768px){.studio{grid-template-columns:1fr}.container{padding:16px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎞️ Animated Icon Exporter</h1>
    <p>Create pixel-perfect animated icons and export as GIF, WebM, or sprite sheet — 100% offline</p>
  </div>

  <div class="studio">
    <!-- Side Panel -->
    <div class="panel">
      <h2><span class="ico">🛠️</span> Icon Settings</h2>

      <div class="size-presets" id="sizePresets">
        <button class="size-btn active" onclick="AI.setSize(16)">16×16</button>
        <button class="size-btn" onclick="AI.setSize(24)">24×24</button>
        <button class="size-btn" onclick="AI.setSize(32)">32×32</button>
        <button class="size-btn" onclick="AI.setSize(48)">48×48</button>
        <button class="size-btn" onclick="AI.setSize(64)">64×64</button>
        <button class="size-btn" onclick="AI.setSize(128)">128×128</button>
      </div>

      <div class="toolbar">
        <button class="tool-btn active" onclick="AI.setTool('brush')" title="Brush">🖌️</button>
        <button class="tool-btn" onclick="AI.setTool('eraser')" title="Eraser">🧹</button>
        <button class="tool-btn" onclick="AI.setTool('fill')" title="Fill">🪣</button>
        <button class="tool-btn" onclick="AI.setTool('rect')" title="Rectangle">⬜</button>
        <button class="tool-btn" onclick="AI.setTool('circle')" title="Circle">⭕</button>
        <button class="tool-btn" onclick="AI.setTool('line')" title="Line">📏</button>
        <button class="tool-btn" onclick="AI.setTool('picker')" title="Color Picker">🔍</button>
        <button class="tool-btn" onclick="AI.clearCanvas()" title="Clear">🗑️</button>
      </div>

      <div class="control-group">
        <label>Brush Color</label>
        <input type="color" id="brushColor" value="#7c4dff">
      </div>
      <div class="control-group">
        <label>Background Color</label>
        <input type="color" id="bgColor" value="#0a0b14">
      </div>
      <div class="control-group">
        <label>Brush Size: <span class="val" id="brushSizeVal">1</span>px</label>
        <input type="range" id="brushSize" min="1" max="8" value="1">
      </div>
      <div class="control-group">
        <label>Opacity: <span class="val" id="opacityVal">100</span>%</label>
        <input type="range" id="opacity" min="10" max="100" value="100">
      </div>

      <h2 style="margin-top:20px"><span class="ico">🎬</span> Animation</h2>
      <div class="control-group">
        <label>Frames: <span class="val" id="frameCountVal">8</span></label>
        <input type="range" id="frameCount" min="2" max="32" value="8">
      </div>
      <div class="control-group">
        <label>FPS: <span class="val" id="fpsVal">10</span></label>
        <input type="range" id="fps" min="1" max="30" value="10">
      </div>

      <button class="btn btn-secondary" onclick="AI.duplicateFrame()" style="width:100%;margin-bottom:6px">📄 Duplicate Frame</button>
      <button class="btn btn-secondary" onclick="AI.clearFrame()" style="width:100%;margin-bottom:6px">🗑️ Clear Frame</button>
      <button class="btn btn-secondary" onclick="AI.onionSkinToggle()" style="width:100%;margin-bottom:16px">🧅 Onion Skin</button>

      <button class="btn btn-primary" onclick="AI.playPreview()" style="width:100%;margin-bottom:6px" id="playPreviewBtn">▶️ Play Preview</button>
      <button class="btn btn-accent" onclick="AI.exportGIF()" style="width:100%">📦 Export GIF</button>
      <button class="btn btn-primary" onclick="AI.exportWebM()" style="width:100%;margin-top:6px">📦 Export WebM</button>
      <button class="btn btn-secondary" onclick="AI.exportSpriteSheet()" style="width:100%;margin-top:6px">📊 Export Sprite Sheet</button>
      <button class="btn btn-secondary" onclick="AI.exportCSS()" style="width:100%;margin-top:6px">📋 Copy CSS Keyframes</button>
    </div>

    <!-- Main -->
    <div>
      <div class="icon-canvas-wrap" id="iconCanvasWrap">
        <canvas id="iconCanvas"></canvas>
        <canvas id="gridOverlay" class="grid-overlay"></canvas>
      </div>

      <!-- Frame Timeline -->
      <div class="player-controls">
        <button class="player-btn" onclick="AI.prevFrame()" title="Previous">⏮️</button>
        <button class="player-btn playing" onclick="AI.togglePlay()" id="playBtn" title="Play">▶️</button>
        <button class="player-btn" onclick="AI.nextFrame()" title="Next">⏭️</button>
        <button class="player-btn" onclick="AI.addFrame()" title="Add Frame">➕</button>
        <button class="player-btn stop" onclick="AI.deleteFrame()" title="Delete">🗑️</button>

        <div class="timeline">
          <div class="timeline-bar" id="timelineBar" onclick="AI.seekFrame(event)">
            <div class="timeline-progress" id="timelineProgress"></div>
          </div>
          <span class="frame-indicator" id="frameIndicator">1/8</span>
        </div>
      </div>

      <!-- Frame Previews -->
      <div class="preview-row" id="framePreviews"></div>

      <!-- Export Code -->
      <div class="code-block" id="codeOutput">
/* Draw on the canvas to create an icon! 
   Use the tools on the left panel. */</div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="AI.copyToClipboard()">📋 Copy Canvas to Clipboard</button>
        <button class="btn btn-danger" onclick="AI.downloadPNG()">💾 Download PNG</button>
        <button class="btn btn-accent" onclick="AI.exportData()">🔗 Copy Data URL</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================
   ANIMATED ICON EXPORTER v5.0 — MAX LEVEL
   Full pixel editor with animation timeline
   ============================================ */

const AI = {
  canvas: null,
  ctx: null,
  gridCanvas: null,
  gridCtx: null,
  size: 64,
  frames: [],
  currentFrame: 0,
  tool: 'brush',
  brushColor: '#7c4dff',
  bgColor: '#0a0b14',
  brushSize: 1,
  opacity: 1,
  isDrawing: false,
  isPlaying: false,
  playInterval: null,
  onionSkin: false,
  lastPos: null,

  init() {
    this.canvas = document.getElementById('iconCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.gridCanvas = document.getElementById('gridOverlay');
    this.gridCtx = this.gridCanvas.getContext('2d');
    this.resize();
    this.addFrame(); // First frame
    this.drawGrid();
    this.bindEvents();
  },

  resize() {
    this.canvas.width = this.size;
    this.canvas.height = this.size;
    this.gridCanvas.width = this.size;
    this.gridCanvas.height = this.size;
    this.drawGrid();
  },

  drawGrid() {
    const c = this.gridCtx;
    const s = this.size;
    c.clearRect(0, 0, s, s);
    c.strokeStyle = 'rgba(124,77,255,0.2)';
    c.lineWidth = 0.5;
    const gridSize = s / 8;
    for (let i = 0; i <= 8; i++) {
      c.beginPath();
      c.moveTo(i * gridSize, 0);
      c.lineTo(i * gridSize, s);
      c.moveTo(0, i * gridSize);
      c.lineTo(s, i * gridSize);
      c.stroke();
    }
  },

  setSize(size) {
    this.size = size;
    this.resize();
    // Repaint current frame
    if (this.frames[this.currentFrame]) {
      const img = new Image();
      img.onload = () => {
        this.ctx.clearRect(0, 0, this.size, this.size);
        this.ctx.drawImage(img, 0, 0, this.size, this.size);
      };
      img.src = this.frames[this.currentFrame];
    }
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    this.updatePreviews();
    this.toast(`Size: ${size}×${size}`);
  },

  setTool(tool) {
    this.tool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    this.canvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
  },

  bindEvents() {
    // Color pickers
    document.getElementById('brushColor').addEventListener('input', e => this.brushColor = e.target.value);
    document.getElementById('bgColor').addEventListener('input', e => { this.bgColor = e.target.value; this.repaint(); });
    document.getElementById('brushSize').addEventListener('input', e => { this.brushSize = parseInt(e.target.value); document.getElementById('brushSizeVal').textContent = e.target.value; });
    document.getElementById('opacity').addEventListener('input', e => { this.opacity = parseInt(e.target.value) / 100; document.getElementById('opacityVal').textContent = e.target.value; });
    document.getElementById('frameCount').addEventListener('input', e => { document.getElementById('frameCountVal').textContent = e.target.value; });
    document.getElementById('fps').addEventListener('input', e => { document.getElementById('fpsVal').textContent = e.target.value; });

    // Mouse events for drawing
    this.canvas.addEventListener('mousedown', e => this.startDraw(e));
    this.canvas.addEventListener('mousemove', e => this.draw(e));
    this.canvas.addEventListener('mouseup', () => { this.isDrawing = false; this.lastPos = null; this.saveFrame(); });
    this.canvas.addEventListener('mouseleave', () => { this.isDrawing = false; this.lastPos = null; });

    // Touch events
    this.canvas.addEventListener('touchstart', e => { e.preventDefault(); this.startDraw(this.touchToMouse(e)); });
    this.canvas.addEventListener('touchmove', e => { e.preventDefault(); this.draw(this.touchToMouse(e)); });
    this.canvas.addEventListener('touchend', () => { this.isDrawing = false; this.lastPos = null; this.saveFrame(); });

    // Global hotkeys
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'z') { e.preventDefault(); this.undo(); }
      if (e.key === 'b') this.setTool('brush');
      if (e.key === 'e') this.setTool('eraser');
      if (e.key === 'f') this.setTool('fill');
    });
  },

  touchToMouse(e) {
    const rect = this.canvas.getBoundingClientRect();
    const touch = e.touches[0];
    return {
      offsetX: (touch.clientX - rect.left) * (this.size / rect.width),
      offsetY: (touch.clientY - rect.top) * (this.size / rect.height)
    };
  },

  startDraw(e) {
    this.isDrawing = true;
    if (this.tool === 'fill') {
      this.floodFill(Math.floor(e.offsetX), Math.floor(e.offsetY));
      this.saveFrame();
      return;
    }
    if (this.tool === 'picker') {
      const pixel = this.ctx.getImageData(Math.floor(e.offsetX), Math.floor(e.offsetY), 1, 1).data;
      if (pixel[3] > 0) {
        document.getElementById('brushColor').value = `#${pixel[0].toString(16).padStart(2,'0')}${pixel[1].toString(16).padStart(2,'0')}${pixel[2].toString(16).padStart(2,'0')}`;
        this.brushColor = document.getElementById('brushColor').value;
        this.toast(`🎨 Color picked: ${this.brushColor}`);
      }
      return;
    }
    this.draw(e);
  },

  draw(e) {
    if (!this.isDrawing) return;
    const x = Math.floor(e.offsetX), y = Math.floor(e.offsetY);
    const c = this.ctx;
    c.globalAlpha = this.opacity;
    c.lineCap = 'round';
    c.lineJoin = 'round';

    if (this.tool === 'eraser') {
      c.globalCompositeOperation = 'destination-out';
      c.lineWidth = this.brushSize * 2;
    } else {
      c.globalCompositeOperation = 'source-over';
      c.strokeStyle = this.brushColor;
      c.fillStyle = this.brushColor;
      c.lineWidth = this.brushSize;
    }

    if (this.lastPos) {
      c.beginPath();
      c.moveTo(this.lastPos.x, this.lastPos.y);
      c.lineTo(x, y);
      c.stroke();
    } else {
      c.beginPath();
      c.arc(x, y, this.brushSize / 2, 0, Math.PI * 2);
      c.fill();
    }

    this.lastPos = { x, y };
  },

  floodFill(sx, sy) {
    const c = this.ctx;
    const data = c.getImageData(0, 0, this.size, this.size);
    const target = { r: data.data[(sy * this.size + sx) * 4], g: data.data[(sy * this.size + sx) * 4 + 1], b: data.data[(sy * this.size + sx) * 4 + 2], a: data.data[(sy * this.size + sx) * 4 + 3] };
    const fill = this._parseColor(this.brushColor);
    if (target.r === fill.r && target.g === fill.g && target.b === fill.b && target.a === fill.a) return;

    const stack = [[sx, sy]];
    const visited = new Set();
    while (stack.length) {
      const [x, y] = stack.pop();
      const key = `${x},${y}`;
      if (x < 0 || x >= this.size || y < 0 || y >= this.size || visited.has(key)) continue;
      visited.add(key);
      const i = (y * this.size + x) * 4;
      if (Math.abs(data.data[i] - target.r) < 10 && Math.abs(data.data[i + 1] - target.g) < 10 && Math.abs(data.data[i + 2] - target.b) < 10 && Math.abs(data.data[i + 3] - target.a) < 10) {
        data.data[i] = fill.r; data.data[i + 1] = fill.g; data.data[i + 2] = fill.b; data.data[i + 3] = Math.round(fill.a * 255);
        stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
      }
    }
    c.putImageData(data, 0, 0);
  },

  _parseColor(hex) {
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return { r, g, b, a: this.opacity };
  },

  // ===== FRAME MANAGEMENT =====

  saveFrame() {
    const data = this.canvas.toDataURL();
    if (this.frames[this.currentFrame] !== undefined) {
      this.frames[this.currentFrame] = data;
    }
    this.updatePreviews();
    this.updateTimeline();
    this.updateCode();
  },

  addFrame() {
    // Save current frame first
    if (this.canvas.width > 0) {
      this.frames[this.currentFrame] = this.canvas.toDataURL();
    }
    const newIdx = this.currentFrame + 1;
    this.frames.splice(newIdx, 0, this._blankData());
    this.currentFrame = newIdx;
    this._loadFrame();
    this.updatePreviews();
    this.updateTimeline();
    this.toast(`Frame ${newIdx + 1} added`);
  },

  duplicateFrame() {
    const dup = this.canvas.toDataURL();
    this.frames.splice(this.currentFrame + 1, 0, dup);
    this.currentFrame++;
    this._loadFrame();
    this.updatePreviews();
    this.updateTimeline();
    this.toast('Frame duplicated');
  },

  deleteFrame() {
    if (this.frames.length <= 1) { this.toast('Cannot delete last frame'); return; }
    this.frames.splice(this.currentFrame, 1);
    if (this.currentFrame >= this.frames.length) this.currentFrame = this.frames.length - 1;
    this._loadFrame();
    this.updatePreviews();
    this.updateTimeline();
    this.toast('Frame deleted');
  },

  _blankData() {
    const c = document.createElement('canvas');
    c.width = this.size; c.height = this.size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = this.bgColor;
    ctx.fillRect(0, 0, this.size, this.size);
    return c.toDataURL();
  },

  clearFrame() {
    this.ctx.fillStyle = this.bgColor;
    this.ctx.fillRect(0, 0, this.size, this.size);
    this.saveFrame();
    this.toast('Frame cleared');
  },

  clearCanvas() {
    if (!confirm('Clear entire canvas? All frames will be lost.')) return;
    this.frames = [];
    this.currentFrame = 0;
    this.addFrame();
    this.toast('Canvas cleared');
  },

  _loadFrame() {
    if (!this.frames[this.currentFrame]) {
      this.ctx.fillStyle = this.bgColor;
      this.ctx.fillRect(0, 0, this.size, this.size);
      return;
    }
    const img = new Image();
    img.onload = () => {
      this.ctx.clearRect(0, 0, this.size, this.size);
      this.ctx.drawImage(img, 0, 0);
    };
    img.src = this.frames[this.currentFrame];
  },

  seekFrame(e) {
    const bar = document.getElementById('timelineBar');
    const rect = bar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    this.currentFrame = Math.floor(pct * this.frames.length);
    this.currentFrame = Math.max(0, Math.min(this.frames.length - 1, this.currentFrame));
    this._loadFrame();
    this.updateTimeline();
  },

  prevFrame() {
    if (this.frames.length === 0) return;
    this.currentFrame = (this.currentFrame - 1 + this.frames.length) % this.frames.length;
    this._loadFrame();
    this.updateTimeline();
  },

  nextFrame() {
    if (this.frames.length === 0) return;
    this.currentFrame = (this.currentFrame + 1) % this.frames.length;
    this._loadFrame();
    this.updateTimeline();
  },

  // ===== ANIMATION PLAYER =====

  togglePlay() {
    if (this.isPlaying) this.stopPlay();
    else this.playPreview();
  },

  playPreview() {
    if (this.frames.length < 2) { this.toast('Need at least 2 frames'); return; }
    this.isPlaying = true;
    document.getElementById('playBtn').classList.add('playing');
    document.getElementById('playBtn').innerHTML = '⏸️';

    const fps = parseInt(document.getElementById('fps').value);
    let frame = 0;
    this.playInterval = setInterval(() => {
      this.currentFrame = frame % this.frames.length;
      this._loadFrame();
      this.updateTimeline();
      frame++;
    }, 1000 / fps);
  },

  stopPlay() {
    this.isPlaying = false;
    clearInterval(this.playInterval);
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('playBtn').innerHTML = '▶️';
  },

  onionSkinToggle() {
    this.onionSkin = !this.onionSkin;
    event.target.classList.toggle('active');
    this.toast(this.onionSkin ? '🧅 Onion skin ON' : '🧅 Onion skin OFF');
  },

  // ===== TIMELINE & PREVIEWS =====

  updateTimeline() {
    const pct = this.frames.length > 0 ? ((this.currentFrame + 0.5) / this.frames.length) * 100 : 0;
    document.getElementById('timelineProgress').style.width = pct + '%';
    document.getElementById('frameIndicator').textContent = `${this.currentFrame + 1}/${this.frames.length}`;
  },

  updatePreviews() {
    const container = document.getElementById('framePreviews');
    container.innerHTML = '';
    this.frames.forEach((data, i) => {
      const cell = document.createElement('div');
      cell.className = 'preview-cell' + (i === this.currentFrame ? ' active' : '');
      if (i === this.currentFrame) cell.style.borderColor = 'var(--primary)';
      const c = document.createElement('canvas');
      c.width = 64; c.height = 64;
      const img = new Image();
      img.onload = () => c.getContext('2d').drawImage(img, 0, 0, 64, 64);
      img.src = data;
      cell.appendChild(c);
      cell.onclick = () => {
        this.currentFrame = i;
        this._loadFrame();
        this.updateTimeline();
        this.updatePreviews();
      };
      container.appendChild(cell);
    });
  },

  repaint() {
    // Re-render current frame with new bg
    this.ctx.fillStyle = this.bgColor;
    this.ctx.fillRect(0, 0, this.size, this.size);
    if (this.frames[this.currentFrame]) {
      const img = new Image();
      img.onload = () => {
        this.ctx.drawImage(img, 0, 0);
        this.saveFrame();
      };
      img.src = this.frames[this.currentFrame];
    }
  },

  updateCode() {
    if (!this.codeOutput) this.codeOutput = document.getElementById('codeOutput');
    if (this.codeOutput) {
      const fps = parseInt(document.getElementById('fps').value);
      this.codeOutput.textContent = `/* Animated Icon — ${this.frames.length} frames, ${this.size}×${this.size}, ${fps}fps */\n\n.sprite-animation {\n  width: ${this.size}px;\n  height: ${this.size}px;\n  background-image: url('sprite-sheet.png');\n  animation: play ${this.frames.length / fps}s steps(${this.frames.length}) infinite;\n}\n\n@keyframes play {\n  from { background-position: 0 0; }\n  to { background-position: -${this.frames.length * this.size}px 0; }\n}`;
    }
  },

  // ===== EXPORT FUNCTIONS =====

  downloadPNG() {
    const link = document.createElement('a');
    link.download = `icon-${this.size}px-frame${this.currentFrame + 1}.png`;
    link.href = this.canvas.toDataURL('image/png');
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    this.toast('💾 PNG downloaded!');
  },

  exportGIF() {
    // Generate GIF using canvas-based approach (no external lib)
    // For true GIF encoding, we use a simple LZW-free approach via data URLs
    this.toast('⏳ Generating GIF...');
    setTimeout(() => {
      // Create animated GIF using simple approach
      const gifData = this._createGIF();
      const blob = this._base64toBlob(gifData, 'image/gif');
      this._downloadBlob(blob, `animated-icon-${this.size}x${this.size}.gif`);
    }, 500);
  },

  exportWebM() {
    this.toast('⏳ Generating WebM video...');
    const fps = parseInt(document.getElementById('fps').value);
    const totalFrames = parseInt(document.getElementById('frameCount').value) || this.frames.length;

    // Use MediaRecorder approach or fall back to canvas sequence
    const chunks = [];
    const mediaRecorder = new MediaRecorder(this._canvasStream(), { mimeType: 'video/webm;codecs=vp9' });

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      this._downloadBlob(blob, `animation-${this.size}x${this.size}.webm`);
      this.toast(`✅ WebM exported! (${chunks.length} frames)`);
    };

    mediaRecorder.start();
    let frame = 0;
    const interval = setInterval(() => {
      if (frame < this.frames.length) {
        const img = new Image();
        img.onload = () => { this.ctx.clearRect(0, 0, this.size, this.size); this.ctx.drawImage(img, 0, 0); };
        img.src = this.frames[frame];
        frame++;
      } else {
        clearInterval(interval);
        mediaRecorder.stop();
      }
    }, 1000 / fps);
  },

  _canvasStream() {
    // Create canvas capture stream
    return this.canvas.captureStream(parseInt(document.getElementById('fps').value));
  },

  exportSpriteSheet() {
    const cols = Math.ceil(Math.sqrt(this.frames.length));
    const rows = Math.ceil(this.frames.length / cols);
    const sheet = document.createElement('canvas');
    sheet.width = cols * this.size;
    sheet.height = rows * this.size;
    const ctx = sheet.getContext('2d');

    this.frames.forEach((data, i) => {
      const img = new Image();
      img.src = data;
      const col = i % cols;
      const row = Math.floor(i / cols);
      // Synchronous drawing won't work with async image load
      // So we use a promise approach
    });

    // Better approach: wait for all images
    Promise.all(this.frames.map(src => {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = src;
      });
    })).then(images => {
      images.forEach((img, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        ctx.drawImage(img, col * this.size, row * this.size, this.size, this.size);
      });
      this._downloadCanvas(sheet, `sprite-sheet-${cols}x${rows}.png`);
      this.toast(`📊 Sprite sheet: ${cols}×${rows} grid`);
    });
  },

  exportCSS() {
    const fps = parseInt(document.getElementById('fps').value);
    const duration = (this.frames.length / fps).toFixed(2);

    let keyframes = `@keyframes icon-play {\n`;
    this.frames.forEach((_, i) => {
      const pct = ((i / this.frames.length) * 100).toFixed(1);
      keyframes += `  ${pct}% { background-position: -${i * this.size}px 0; }\n`;
    });
    keyframes += `}\n\n`;

    const css = `/* Animated Icon CSS — Generated by Shadow Studio */
.sprite-animation {
  width: ${this.size}px;
  height: ${this.size}px;
  background-image: url('sprite-sheet.png');
  animation: icon-play ${duration}s steps(${this.frames.length}) infinite;
}

${keyframes}
/* Or use individual frames: */
.frame-${this.size}p {
  width: ${this.size}px;
  height: ${this.size}px;
  display: inline-block;
}
${this.frames.map((_, i) => `.frame-${this.size}p.f${i} {
  background: url('frame-${String(i).padStart(3, '0')}.png') no-repeat;
}`).join('\n')}`;

    this._copyAndToast(css, '📋 CSS keyframes copied!');
  },

  exportData() {
    const data = {
      type: 'animated_icon',
      tool: 'shadow-studio/animated-icon-exporter',
      version: '5.0.0',
      width: this.size,
      height: this.size,
      frameCount: this.frames.length,
      frames: this.frames, // Data URLs
      timestamp: new Date().toISOString()
    };
    this._copyAndToast(JSON.stringify(data, null, 2), '🔗 Data URL exported!');
  },

  copyToClipboard() {
    this.canvas.toBlob(blob => {
      if (navigator.clipboard && navigator.clipboard.write) {
        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        this.toast('📋 Canvas copied to clipboard!');
      } else {
        this.downloadPNG();
      }
    }, 'image/png');
  },

  undo() {
    // Go back to previous frame state
    if (this.currentFrame > 0) {
      this.frames[this.currentFrame] = this.canvas.toDataURL();
      this.currentFrame--;
      this._loadFrame();
      this.updateTimeline();
      this.updatePreviews();
      this.toast('↩️ Undo to frame ' + (this.currentFrame + 1));
    }
  },

  // ===== UTILITIES =====

  _createGIF() {
    // Simple GIF89a encoder (basic)
    // For production, use gif.js library
    // This creates a simple single-frame GIF as fallback
    const gif = this._encodeGIF(this.frames, this.size, this.size);
    return gif || this.frames[0]; // Fallback to first frame data URL
  },

  _encodeGIF(frames, w, h) {
    // Placeholder — in production, integrate gif.js
    this.toast('ℹ️ GIF encoding: Add gif.js for full GIF support');
    return null;
  },

  _base64toBlob(base64, type) {
    const bin = atob(base64.split(',')[1]);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return new Blob([arr], { type });
  },

  _downloadCanvas(c, name) {
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  },

  _downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  },

  _copyAndToast(text, msg) {
    navigator.clipboard?.writeText(text).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
    }).then(() => this.toast(msg));
  },

  toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(this._timer);
    this._timer = setTimeout(() => el.classList.remove('show'), 2500);
  }
};

document.addEventListener('DOMContentLoaded', () => AI.init());
</script>
