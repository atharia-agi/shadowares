<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Color Palette Generator</title>
    <style>
        :root{--bg:#07080f;--surface:rgba(15,23,42,.7);--border:#1e293b;--text:#f1f5f9;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:0 20px 60px;}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,#1e1b4b33,transparent 60%),radial-gradient(ellipse at 80% 100%,#0c4a6e22,transparent 60%);pointer-events:none;}

        .header{text-align:center;padding:50px 0 30px;position:relative;z-index:1;}
        .header h1{font-size:3rem;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#f472b6,#a78bfa,#60a5fa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
        .header p{color:#94a3b8;max-width:600px;margin:10px auto;}

        .input-row{display:flex;justify-content:center;align-items:center;gap:16px;margin:30px auto;flex-wrap:wrap;position:relative;z-index:1;}
        .color-picker-wrap{position:relative;width:70px;height:70px;border-radius:16px;overflow:hidden;border:3px solid #334155;cursor:pointer;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.4);}
        .color-picker-wrap:hover{transform:scale(1.1);border-color:#8b5cf6;}
        .color-picker-wrap input[type="color"]{position:absolute;inset:-10px;width:calc(100% + 20px);height:calc(100% + 20px);border:none;cursor:pointer;}
        .hex-input{padding:16px 24px;font-size:1.3rem;font-weight:700;font-family:monospace;background:#0f172a;border:2px solid #1e293b;color:#f1f5f9;border-radius:14px;width:200px;text-align:center;outline:none;transition:.3s;}
        .hex-input:focus{border-color:#8b5cf6;box-shadow:0 0 20px rgba(139,92,246,.2);}
        .btn-gen{padding:16px 36px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:.3s;box-shadow:0 6px 20px rgba(109,40,217,.4);}
        .btn-gen:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 10px 30px rgba(109,40,217,.6);}
        .btn-rand{padding:16px 20px;background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:14px;font-size:1.1rem;cursor:pointer;transition:.3s;}
        .btn-rand:hover{background:#334155;color:#fff;}

        .results{max-width:1200px;margin:0 auto;position:relative;z-index:1;}
        .palette-section{margin-top:40px;}
        .palette-section .title{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
        .palette-section .title h2{font-size:1.4rem;color:#e2e8f0;white-space:nowrap;}
        .palette-section .title .line{flex:1;height:1px;background:linear-gradient(90deg,#334155,transparent);}

        .palette-row{display:flex;gap:8px;flex-wrap:wrap;}
        .swatch{
            flex:1;min-width:100px;min-height:120px;border-radius:14px;display:flex;flex-direction:column;
            justify-content:flex-end;padding:12px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);
            position:relative;overflow:hidden;border:2px solid transparent;
        }
        .swatch:hover{transform:translateY(-6px) scale(1.04);border-color:rgba(255,255,255,.3);box-shadow:0 16px 40px rgba(0,0,0,.5);}
        .swatch .hex{font-family:monospace;font-size:.85rem;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);opacity:.9;}
        .swatch .name{font-size:.65rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
        .swatch .copied{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:.9rem;font-weight:800;color:#fff;background:rgba(0,0,0,.7);padding:6px 14px;border-radius:8px;transition:.2s;pointer-events:none;}
        .swatch.flash .copied{transform:translate(-50%,-50%) scale(1);}

        /* Shades & Tints Grid */
        .shade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;}
        .shade-cell{
            height:70px;border-radius:10px;display:flex;align-items:flex-end;justify-content:center;
            padding:6px;cursor:pointer;transition:.25s;font-family:monospace;font-size:.65rem;
            font-weight:600;color:rgba(255,255,255,.8);text-shadow:0 1px 3px rgba(0,0,0,.5);
        }
        .shade-cell:hover{transform:scale(1.08);box-shadow:0 8px 20px rgba(0,0,0,.4);}

        /* Export */
        .export-box{margin-top:40px;background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:20px 24px;position:relative;}
        .export-box pre{font-family:'Cascadia Code',monospace;font-size:.85rem;color:#a5f3fc;line-height:1.7;overflow-x:auto;white-space:pre-wrap;}
        .export-box .cp{position:absolute;top:10px;right:10px;background:#334155;color:#e2e8f0;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.75rem;transition:.2s;}
        .export-box .cp:hover{background:#475569;}

        /* Preview Cards */
        .preview-section{margin-top:40px;}
        .preview-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
        .preview-card{border-radius:16px;padding:24px;transition:.3s;}
        .preview-card:hover{transform:translateY(-4px);}
        .preview-card h3{margin-bottom:6px;font-size:1.2rem;}
        .preview-card p{font-size:.85rem;opacity:.8;line-height:1.5;}
        .preview-card .tag{display:inline-block;padding:4px 12px;border-radius:8px;font-size:.75rem;font-weight:700;margin-top:10px;}

        @media(max-width:600px){.swatch{min-width:60px;min-height:80px;}.header h1{font-size:2rem;}}
    </style>
</head>
<body>

<div class="header">
    <h1>🎨 Color Palette Generator</h1>
    <p>Masukkan 1 warna. Sistem akan menghitung harmoni warna berdasarkan teori warna (Complementary, Analogous, Triadic, Split) + generate shades/tints otomatis. Klik swatch untuk copy hex.</p>
</div>

<div class="input-row">
    <div class="color-picker-wrap"><input type="color" id="color-pick" value="#8b5cf6"></div>
    <input type="text" class="hex-input" id="hex-input" value="#8b5cf6" maxlength="7" placeholder="#8b5cf6">
    <button class="btn-gen" onclick="generate()">Generate Palettes</button>
    <button class="btn-rand" onclick="randomColor()">🎲 Random</button>
</div>

<div class="results" id="results"></div>

<script>
    const pick = document.getElementById('color-pick');
    const hexIn = document.getElementById('hex-input');
    const results = document.getElementById('results');

    pick.addEventListener('input', () => { hexIn.value = pick.value; generate(); });
    hexIn.addEventListener('input', () => {
        let v = hexIn.value;
        if (v.length === 7 && /^#[0-9a-fA-F]{6}$/.test(v)) { pick.value = v; generate(); }
    });

    // --- COLOR MATH ---
    function hexToHSL(hex) {
        let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
        const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
        let h=0, s=0, l=(max+min)/2;
        if (d !== 0) {
            s = l > 0.5 ? d/(2-max-min) : d/(max+min);
            if (max===r) h = ((g-b)/d + (g<b?6:0))/6;
            else if (max===g) h = ((b-r)/d+2)/6;
            else h = ((r-g)/d+4)/6;
        }
        return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
    }

    function hslToHex(h,s,l) {
        h = ((h%360)+360)%360; s/=100; l/=100;
        const a = s*Math.min(l,1-l);
        const f = n => { const k=(n+h/30)%12; return l - a*Math.max(-1,Math.min(k-3,9-k,1)); };
        const toHex = x => Math.round(x*255).toString(16).padStart(2,'0');
        return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
    }

    function getContrast(hex) {
        const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
        return (r*299+g*587+b*114)/1000 > 128 ? '#1e293b' : '#ffffff';
    }

    // --- PALETTE GENERATORS ---
    function complementary(h,s,l) { return [hslToHex(h,s,l), hslToHex(h+180,s,l)]; }
    function analogous(h,s,l) { return [hslToHex(h-30,s,l), hslToHex(h,s,l), hslToHex(h+30,s,l)]; }
    function triadic(h,s,l) { return [hslToHex(h,s,l), hslToHex(h+120,s,l), hslToHex(h+240,s,l)]; }
    function splitComp(h,s,l) { return [hslToHex(h,s,l), hslToHex(h+150,s,l), hslToHex(h+210,s,l)]; }
    function tetradic(h,s,l) { return [hslToHex(h,s,l), hslToHex(h+90,s,l), hslToHex(h+180,s,l), hslToHex(h+270,s,l)]; }

    function shades(h,s,l, count=10) {
        const arr = [];
        for (let i=0; i<count; i++) {
            const newL = Math.round(95 - (i * (90/count)));
            arr.push(hslToHex(h, s, Math.max(5, newL)));
        }
        return arr;
    }

    // --- SWATCH CLICK TO COPY ---
    function copyHex(el, hex) {
        navigator.clipboard.writeText(hex);
        el.classList.add('flash');
        setTimeout(() => el.classList.remove('flash'), 600);
    }

    // --- RENDER ---
    function renderPalette(title, colors, names) {
        let html = `<div class="palette-section"><div class="title"><h2>${title}</h2><div class="line"></div></div><div class="palette-row">`;
        colors.forEach((c,i) => {
            const label = names ? names[i] : '';
            html += `<div class="swatch" style="background:${c}" onclick="copyHex(this,'${c}')">
                <div class="name">${label}</div><div class="hex">${c.toUpperCase()}</div>
                <div class="copied">Copied!</div>
            </div>`;
        });
        html += '</div></div>';
        return html;
    }

    function renderShades(title, colors) {
        let html = `<div class="palette-section"><div class="title"><h2>${title}</h2><div class="line"></div></div><div class="shade-grid">`;
        colors.forEach(c => {
            html += `<div class="shade-cell" style="background:${c};color:${getContrast(c)}" onclick="copyHex(this,'${c}')">${c.toUpperCase()}</div>`;
        });
        html += '</div></div>';
        return html;
    }

    function generate() {
        const hex = hexIn.value;
        if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
        const [h,s,l] = hexToHSL(hex);

        let out = '';

        // 1. Complementary
        out += renderPalette('🔄 Complementary', complementary(h,s,l), ['Base','Complement']);

        // 2. Analogous
        out += renderPalette('🌈 Analogous', analogous(h,s,l), ['Cool Side','Base','Warm Side']);

        // 3. Triadic
        out += renderPalette('🔺 Triadic', triadic(h,s,l), ['Base','Accent 1','Accent 2']);

        // 4. Split-Complementary
        out += renderPalette('🔀 Split-Complementary', splitComp(h,s,l), ['Base','Split 1','Split 2']);

        // 5. Tetradic
        out += renderPalette('💎 Tetradic (Rectangle)', tetradic(h,s,l), ['Base','Quarter','Opposite','Three-Quarter']);

        // 6. Shades & Tints
        out += renderShades('🌗 Shades & Tints (Light → Dark)', shades(h,s,l,12));

        // 7. Preview Cards
        const tri = triadic(h,s,l);
        out += `<div class="preview-section"><div class="title"><h2>👁️ Live Preview — UI Cards</h2><div class="line"></div></div>
        <div class="preview-cards">
            <div class="preview-card" style="background:${tri[0]};color:${getContrast(tri[0])}">
                <h3>Primary Card</h3><p>Ini contoh tampilan kartu UI menggunakan warna primary palette lo.</p>
                <div class="tag" style="background:${tri[1]};color:${getContrast(tri[1])}">Accent Tag</div>
            </div>
            <div class="preview-card" style="background:${tri[1]};color:${getContrast(tri[1])}">
                <h3>Secondary Card</h3><p>Warna kedua dari triadic harmony. Cocok buat highlight atau CTA.</p>
                <div class="tag" style="background:${tri[2]};color:${getContrast(tri[2])}">Badge</div>
            </div>
            <div class="preview-card" style="background:${tri[2]};color:${getContrast(tri[2])}">
                <h3>Tertiary Card</h3><p>Aksen ketiga. Bisa buat elemen dekoratif atau status indicator.</p>
                <div class="tag" style="background:${tri[0]};color:${getContrast(tri[0])}">Label</div>
            </div>
        </div></div>`;

        // 8. CSS Export
        const comp = complementary(h,s,l);
        const anl = analogous(h,s,l);
        const shd = shades(h,s,l,5);
        out += `<div class="export-box"><button class="cp" onclick="navigator.clipboard.writeText(this.nextElementSibling.textContent)">Copy CSS</button>
<pre>:root {
  --color-primary: ${hex};
  --color-complement: ${comp[1]};
  --color-analogous-cool: ${anl[0]};
  --color-analogous-warm: ${anl[2]};
  --color-triadic-1: ${tri[1]};
  --color-triadic-2: ${tri[2]};
  --color-shade-100: ${shd[0]};
  --color-shade-300: ${shd[1]};
  --color-shade-500: ${shd[2]};
  --color-shade-700: ${shd[3]};
  --color-shade-900: ${shd[4]};
}</pre></div>`;

        results.innerHTML = out;
    }

    function randomColor() {
        const hex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
        hexIn.value = hex; pick.value = hex; generate();
    }

    // Auto-generate on load
    generate();
</script>

</body>
</html>
