<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 Mesh Gradient Generator v5.0 — Shadow Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b14;--surface:#15172a;--border:#2a2d4a;--text:#f1f3f7;--text-muted:#94a0b8;--primary:#7c4dff;--accent:#00e5ff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:40px}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:2.5rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#7c4dff,#9c6bff,#00e5ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-muted);font-size:1.05rem}

/* Layout */
.studio{display:grid;grid-template-columns:320px 1fr;gap:24px}
.panel{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border)}
.panel h2{font-size:1.05rem;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.panel h2 .ico{font-size:1.3rem}

/* Controls */
.control-group{margin-bottom:18px}
.control-group label{display:block;font-size:.78rem;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.control-group input[type="range"]{width:100%;height:6px;-webkit-appearance:none;background:var(--border);border-radius:3px;outline:none}
.control-group input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--primary);border-radius:50%;cursor:pointer;box-shadow:0 0 8px rgba(124,77,255,.5)}
.control-group .val{text-align:right;font-size:.8rem;color:var(--accent);margin-top:3px}
.control-group input[type="color"]{width:100%;height:38px;border:none;border-radius:8px;cursor:pointer;background:var(--bg)}

.color-palette{display:flex;gap:8px;margin-bottom:16px}
.color-swatch{width:40px;height:40px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:transform .2s}
.color-swatch:hover{transform:scale(1.12)}

/* Gradient Presets */
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:12px 0}
.preset-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);cursor:pointer;transition:all .2s;font-size:.72rem;font-family:inherit;text-align:center}
.preset-btn:hover{border-color:var(--primary);background:rgba(124,77,255,.08)}
.preset-btn.active{border-color:var(--primary);background:rgba(124,77,255,.15);box-shadow:0 0 10px rgba(124,77,255,.2)}
.preset-btn .swatch{display:inline-block;width:16px;height:16px;border-radius:4px;margin-right:4px;vertical-align:middle}

/* Canvas Preview */
.canvas-container{border-radius:12px;overflow:hidden;background:var(--surface);border:1px solid var(--border);position:relative}
canvas{width:100%;height:100%;display:block}
.canvas-hint{position:absolute;bottom:12px;right:14px;font-size:.68rem;color:var(--text-muted);opacity:.6}

/* Action Buttons */
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn{padding:11px 18px;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-size:.82rem;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#7c4dff,#9c6bff);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,77,255,.3)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary)}
.btn-accent{background:linear-gradient(135deg,#00e5ff,#22d3ee);color:#0a0b14;font-weight:700}
.btn-accent:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,229,255,.3)}

/* Code Block */
.code-block{background:#0c0e18;border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'Fira Code',monospace;font-size:.72rem;color:#a0a8c0;white-space:pre-wrap;overflow-x:auto;max-height:200px;overflow-y:auto;margin-top:16px}
.code-block .cmt{color:#5c7a99}.code-block .key{color:#82aaff}.code-block .val{color:#c3e88d}

/* Export Card */
.export-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px}
.export-card h3{font-size:.92rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.export-btns{display:flex;gap:8px;flex-wrap:wrap}
.ex-btn{padding:8px 14px;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;border:none;font-size:.78rem;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.ex-btn-copy{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.ex-btn-copy:hover{border-color:var(--primary)}
.ex-btn-dl{background:linear-gradient(135deg,#7c4dff,#9c6bff);color:#fff}
.ex-btn-dl:hover{box-shadow:0 4px 12px rgba(124,77,255,.3)}

/* Responsive */
@media(max-width:768px){.studio{grid-template-columns:1fr}.container{padding:16px}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--primary);border-radius:10px;padding:12px 20px;font-size:.85rem;z-index:100000;opacity:0;transform:translateY(20px);transition:all .3s;box-shadow:0 8px 32px rgba(0,0,0,.4);pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🌈 Mesh Gradient Generator</h1>
    <p>Real-time animated mesh gradients — export PNG, CSS, or copy canvas data</p>
  </div>

  <div class="studio">
    <!-- Controls -->
    <div class="panel">
      <h2><span class="ico">🎨</span> Controls</h2>

      <div class="control-group">
        <label>Animation Speed: <span class="val" id="speedVal">30%</span></label>
        <input type="range" id="speedControl" min="0" max="100" value="30">
      </div>
      <div class="control-group">
        <label>Noise Intensity: <span class="val" id="noiseVal">40%</span></label>
        <input type="range" id="noiseControl" min="0" max="100" value="40">
      </div>
      <div class="control-group">
        <label>Color Mix: <span class="val" id="mixVal">60%</span></label>
        <input type="range" id="mixControl" min="0" max="100" value="60">
      </div>
      <div class="control-group">
        <label>Resolution Scale: <span class="val" id="resVal">50%</span></label>
        <input type="range" id="resControl" min="10" max="100" value="50">
      </div>

      <div class="control-group">
        <label>Colors</label>
        <div class="color-palette">
          <input type="color" id="color1" value="#7c4dff" class="color-swatch">
          <input type="color" id="color2" value="#00e5ff" class="color-swatch">
          <input type="color" id="color3" value="#ff6b81" class="color-swatch">
          <input type="color" id="color4" value="#f59e0b" class="color-swatch">
        </div>
      </div>

      <h3 style="font-size:.85rem;margin-bottom:10px;color:var(--text-muted)">Quick Presets</h3>
      <div class="preset-grid">
        <button class="preset-btn" onclick="MG.applyPreset('sunset')"><span class="swatch" style="background:linear-gradient(135deg,#ff6b81,#7c4dff,#00e5ff)"></span>Sunset</button>
        <button class="preset-btn" onclick="MG.applyPreset('ocean')"><span class="swatch" style="background:linear-gradient(135deg,#0077b6,#00b4d8,#90e0ef)"></span>Ocean</button>
        <button class="preset-btn" onclick="MG.applyPreset('forest')"><span class="swatch" style="background:linear-gradient(135deg,#2d6a4f,#40916c,#52b788)"></span>Forest</button>
        <button class="preset-btn" onclick="MG.applyPreset('fire')"><span class="swatch" style="background:linear-gradient(135deg,#dc2626,#f59e0b,#fbbf24)"></span>Fire</button>
        <button class="preset-btn" onclick="MG.applyPreset('cosmic')"><span class="swatch" style="background:linear-gradient(135deg,#7c4dff,#4a00e0,#8e24aa)"></span>Cosmic</button>
        <button class="preset-btn" onclick="MG.applyPreset('candy')"><span class="swatch" style="background:linear-gradient(135deg,#ff6b9d,#c44dff,#4ade80)"></span>Candy</button>
      </div>

      <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary" onclick="MG.exportPNG()">💾 Export PNG</button>
        <button class="btn btn-primary" onclick="MG.exportCanvas()">🖼️ Copy Canvas to Clipboard</button>
        <button class="btn btn-secondary" onclick="MG.exportCSS()">📋 Copy CSS Gradient</button>
        <button class="btn btn-secondary" onclick="MG.randomizeColors()">🎲 Randomize Colors</button>
        <button class="btn btn-secondary" onclick="MG.freezeAnimation()">❄️ Freeze / Resume</button>
      </div>
    </div>

    <!-- Main Canvas -->
    <div>
      <div class="canvas-container" id="canvasContainer">
        <canvas id="gradientCanvas"></canvas>
        <span class="canvas-hint" id="canvasHint">800 × 450</span>
      </div>

      <div class="export-card">
        <h3>📋 CSS Output (copy & paste)</h3>
        <div class="code-block" id="codeOutput">/* Adjust settings and click "Copy CSS Gradient" */</div>
        <div class="export-btns">
          <button class="ex-btn ex-btn-copy" onclick="MG.copyCSS()">📋 Copy CSS</button>
          <button class="ex-btn ex-btn-dl" onclick="MG.downloadCSS()">💾 Download .css</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================
   MESH GRADIENT GENERATOR v5.0 — MAX LEVEL
   Real-time canvas animation + multi-export
   ============================================ */

const MG = {
  canvas: null,
  ctx: null,
  animationId: null,
  time: 0,
  frozen: false,
  
  speed: 0.003,
  noiseAmount: 0.4,
  mix: 0.6,
  resScale: 0.5,
  colors: ['#7c4dff', '#00e5ff', '#ff6b81'],

  init() {
    this.canvas = document.getElementById('gradientCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.resize();
    this.bindEvents();
    this.startAnimation();
    window.addEventListener('resize', () => this.resize());
  },

  resize() {
    const container = document.getElementById('canvasContainer');
    const rect = container.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const w = Math.floor(rect.width);
    const h = Math.floor(rect.width * 9 / 16);
    this.canvas.width = w;
    this.canvas.height = h;
    // Apply res scale
    this.canvas.width = Math.floor(w * this.resScale);
    this.canvas.height = Math.floor(h * this.resScale);
    document.getElementById('canvasHint').textContent = `${w} × ${h}`;
  },

  bindEvents() {
    const bind = (id, key, transform, displayId) => {
      const el = document.getElementById(id);
      el.addEventListener('input', (e) => {
        this[key] = transform ? transform(e.target.value) : e.target.value;
        if (displayId) document.getElementById(displayId).textContent = e.target.value + '%';
        if (!this.frozen) this.render();
      });
    };
    bind('speedControl', 'speed', v => v / 10000, 'speedVal');
    bind('noiseControl', 'noiseAmount', v => v / 100, 'noiseVal');
    bind('mixControl', 'mix', v => v / 100, 'mixVal');
    bind('resControl', 'resScale', v => v / 100, 'resVal');

    ['color1','color2','color3','color4'].forEach((id, i) => {
      document.getElementById(id).addEventListener('input', (e) => {
        if (i < this.colors.length) this.colors[i] = e.target.value;
      });
    });
  },

  // Presets
  presets: {
    sunset: { colors: ['#ff6b81','#7c4dff','#00e5ff'], speed: 20, noise: 30, mix: 55 },
    ocean: { colors: ['#0077b6','#00b4d8','#90e0ef'], speed: 15, noise: 50, mix: 40 },
    forest: { colors: ['#2d6a4f','#40916c','#52b788'], speed: 25, noise: 25, mix: 60 },
    fire: { colors: ['#dc2626','#f59e0b','#fbbf24'], speed: 40, noise: 60, mix: 50 },
    cosmic: { colors: ['#7c4dff','#4a00e0','#8e24aa'], speed: 10, noise: 35, mix: 45 },
    candy: { colors: ['#ff6b9d','#c44dff','#4ade80'], speed: 30, noise: 20, mix: 55 }
  },

  applyPreset(name) {
    const p = this.presets[name];
    if (!p) return;
    this.colors = [...p.colors];
    this.speed = p.speed / 10000;
    this.noiseAmount = p.noise / 100;
    this.mix = p.mix / 100;

    document.getElementById('color1').value = this.colors[0];
    document.getElementById('color2').value = this.colors[1];
    document.getElementById('color3').value = this.colors[2];
    document.getElementById('speedControl').value = p.speed;
    document.getElementById('noiseControl').value = p.noise;
    document.getElementById('mixControl').value = p.mix;
    document.getElementById('speedVal').textContent = p.speed + '%';
    document.getElementById('noiseVal').textContent = p.noise + '%';
    document.getElementById('mixVal').textContent = p.mix + '%';

    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    this.updateCode();
    this.toast(`Preset: ${name} applied!`);
  },

  hexToRgb(hex) {
    const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? { r: parseInt(r[1],16), g: parseInt(r[2],16), b: parseInt(r[3],16) } : { r:0, g:0, b:0 };
  },

  lerpColor(c1, c2, t) {
    const a = this.hexToRgb(c1), b = this.hexToRgb(c2);
    const r = Math.round(a.r + (b.r - a.r) * t);
    const g = Math.round(a.g + (b.g - a.g) * t);
    const bl = Math.round(a.b + (b.b - a.b) * t);
    return `rgb(${r},${g},${bl})`;
  },

  render() {
    const w = this.canvas.width, h = this.canvas.height;
    if (w === 0 || h === 0) return;
    const imageData = this.ctx.createImageData(w, h);
    const data = imageData.data;

    for (let y = 0; y < h; y += 2) {
      for (let x = 0; x < w; x += 2) {
        const noise = Math.sin(x * this.noiseAmount + this.time) * Math.cos(y * this.noiseAmount + this.time * 0.5);
        const noise2 = Math.sin(x * this.noiseAmount * 0.7 + this.time * 0.7) * Math.cos(y * this.noiseAmount * 1.3 + this.time * 0.3);
        const t = (Math.sin(x / w * Math.PI + this.time) + Math.cos(y / h * Math.PI + this.time * 0.3)) / 2 * this.mix + (noise + noise2) / 2 * (1 - this.mix);

        let idx = Math.floor(Math.abs(t * this.colors.length * 2)) % (this.colors.length * 2);
        let c1, c2, lt;
        if (idx < this.colors.length) {
          c1 = this.colors[Math.max(0, idx)];
          c2 = this.colors[Math.min(this.colors.length - 1, idx + 1)];
          lt = idx - Math.floor(idx);
        } else {
          const ri = idx - this.colors.length;
          c1 = this.colors[Math.min(this.colors.length - 1, ri + 1)];
          c2 = this.colors[Math.max(0, ri)];
          lt = ri - Math.floor(ri);
        }
        const rgb = this.hexToRgb(this.lerpColor(c1, c2, lt));

        for (let dy = 0; dy < 2; dy++) {
          for (let dx = 0; dx < 2; dx++) {
            const px = x + dx, py = y + dy;
            if (px >= w || py >= h) continue;
            const i = (py * w + px) * 4;
            data[i] = rgb.r;
            data[i + 1] = rgb.g;
            data[i + 2] = rgb.b;
            data[i + 3] = 255;
          }
        }
      }
    }

    // Upscale
    const temp = document.createElement('canvas');
    temp.width = w / 2; temp.height = h / 2;
    temp.getContext('2d').putImageData(imageData, 0, 0);
    this.ctx.imageSmoothingEnabled = false;
    this.ctx.drawImage(temp, 0, 0, w, h);
  },

  animate() {
    if (this.frozen) return;
    this.time += this.speed * 60;
    this.render();
    this.animationId = requestAnimationFrame(() => this.animate());
  },

  startAnimation() { this.animate(); },

  randomizeColors() {
    this.colors = Array.from({length: 4}, () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'));
    ['color1','color2','color3','color4'].forEach((id, i) => document.getElementById(id).value = this.colors[i]);
    this.toast('🎲 Colors randomized!');
  },

  freezeAnimation() {
    this.frozen = !this.frozen;
    if (!this.frozen) this.startAnimation();
    this.toast(this.frozen ? '❄️ Animation frozen' : '▶️ Animation resumed');
  },

  exportPNG() {
    // Use full resolution
    const container = document.getElementById('canvasContainer');
    const rect = container.getBoundingClientRect();
    const fullCanvas = document.createElement('canvas');
    fullCanvas.width = Math.floor(rect.width);
    fullCanvas.height = Math.floor(rect.width * 9 / 16);
    const fctx = fullCanvas.getContext('2d');

    // Re-render at full res
    const oldW = this.canvas.width, oldH = this.canvas.height;
    this.canvas.width = fullCanvas.width;
    this.canvas.height = fullCanvas.height;
    this.render();

    const link = document.createElement('a');
    link.download = `mesh-gradient-${Date.now()}.png`;
    link.href = this.canvas.toDataURL('image/png');
    document.body.appendChild(link); link.click(); document.body.removeChild(link);

    this.canvas.width = oldW; this.canvas.height = oldH;
    this.render();
    this.toast('✅ PNG downloaded!');
  },

  exportCanvas() {
    // Copy canvas to clipboard as blob
    this.canvas.toBlob(blob => {
      if (navigator.clipboard && navigator.clipboard.write) {
        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        this.toast('✅ Canvas copied to clipboard!');
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'mesh-gradient.png';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        this.toast('✅ Downloaded (clipboard not supported)');
      }
    }, 'image/png');
  },

  generateCSS() {
    const colors = this.colors.map(c => c).join(', ');
    return `/* Mesh Gradient — Generated by Shadow Studio */
@keyframes meshShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.mesh-gradient {
  background: linear-gradient(135deg, ${colors});
  background-size: 400% 400%;
  animation: meshShift ${this.speed * 10000 / 60}s ease infinite;
  border-radius: 12px;
}`;
  },

  generateCSSAdvanced() {
    return `/* Mesh Gradient — Full CSS with noise overlay */
.mesh-gradient-container {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  background: linear-gradient(135deg, ${this.colors[0]}, ${this.colors[1]}, ${this.colors[2] || this.colors[0]});
  background-size: 400% 400%;
  animation: meshShift ${this.speed * 10000 / 60}s ease infinite;
}

.mesh-gradient-noise::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: ${this.noiseAmount * 0.3};
  mix-blend-mode: overlay;
  // Consider using an SVG noise filter for pure CSS noise
}

@keyframes meshShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}`;
  },

  copyCSS() {
    const css = this.generateCSSAdvanced();
    navigator.clipboard?.writeText(css) || this._fallbackCopy(css);
    this.toast('📋 CSS copied! Paste into your stylesheet.');
  },

  downloadCSS() {
    const css = this.generateCSSAdvanced();
    shadowStudio.get('utils').download('mesh-gradient.css', css, 'text/css');
    this.toast('💾 CSS file downloaded!');
  },

  updateCode() {
    if (!this.codeOutput) this.codeOutput = document.getElementById('codeOutput');
    if (this.codeOutput) this.codeOutput.textContent = this.generateCSSAdvanced();
  },

  _fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  },

  toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(this._timer);
    this._timer = setTimeout(() => el.classList.remove('show'), 2500);
  }
};

document.addEventListener('DOMContentLoaded', () => MG.init());
</script>
</body>
</html>
