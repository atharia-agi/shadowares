<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Premium Lo-Fi Generator</title>
    <style>
        :root { --bg: #111827; --primary: #8b5cf6; --text: #f8fafc; }
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            padding: 0; margin: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #4c1d95 0%, var(--bg) 80%);
        }
        
        .container { z-index: 10; text-align: center; width: 100%; max-width: 800px; padding: 40px; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        h1 { font-size: 3rem; margin-bottom: 5px; color: #c4b5fd; text-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 30px; }
        
        .btn-play {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: white;
            padding: 20px 50px; border-radius: 50px; font-size: 1.5rem; font-weight: bold;
            border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(109, 40, 217, 0.5);
        }
        .btn-play:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 40px rgba(109, 40, 217, 0.7); }
        
        .btn-stop {
            margin-top: 20px; background: transparent; border: 1px solid #ef4444; color: #ef4444;
            padding: 10px 30px; border-radius: 30px; cursor: pointer; display: none; font-size: 1rem;
            transition: 0.3s;
        }
        .btn-stop:hover { background: #ef4444; color: white; }
        
        .status { margin-top: 20px; font-weight: bold; color: #a78bfa; height: 20px; }
        
        /* Vinyl Record Animation */
        .vinyl { width: 150px; height: 150px; background: #111; border-radius: 50%; border: 4px solid #333; margin: 0 auto 30px auto; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .vinyl::after { content: ''; width: 50px; height: 50px; background: #8b5cf6; border-radius: 50%; border: 2px solid #000; }
        .vinyl::before { content: ''; width: 10px; height: 10px; background: #fff; border-radius: 50%; position: absolute; z-index: 2; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinning { animation: spin 4s linear infinite; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="visualizer"></canvas>

<div class="container">
    <div class="vinyl" id="vinyl"></div>
    <h1>Premium Lo-Fi / Chillhop Generator</h1>
    <p>Algoritma murni yang merakit *FM Synthesis* (Rhodes Electric Piano) dan *Sub-Bass* menjadi irama Lo-Fi Jazz kualitas komersial yang siap jual. Bebas noise, bebas suara nyaring.</p>
    
    <button class="btn-play" id="btn-play">▶️ Generate Sellable Lo-Fi Beat</button>
    <br>
    <button class="btn-stop" id="btn-stop">⏹️ Stop Music</button>
    
    <div class="status" id="status-text"></div>
</div>

<script>
    let audioCtx = null;
    let masterGain = null;
    let seqInterval = null;
    let analyser = null;

    // --- FREQUENCIES FOR JAZZ CHORDS (Lo-Fi style) ---
    // C Major 9, A Minor 11, D Minor 9, G 13
    const chords = [
        [130.81, 164.81, 196.00, 246.94, 293.66], // Cmaj9 (C3, E3, G3, B3, D4)
        [110.00, 164.81, 196.00, 261.63, 293.66], // Am11  (A2, E3, G3, C4, D4)
        [146.83, 174.61, 220.00, 261.63, 329.63], // Dm9   (D3, F3, A3, C4, E4)
        [97.99,  174.61, 246.94, 329.63]          // G13   (G2, F3, B3, E4)
    ];

    // C Major Pentatonic for melody (matches all chords safely)
    const melodyScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];

    function initAudio() {
        if(audioCtx) { audioCtx.close(); clearInterval(seqInterval); }
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.6;
        
        // Premium Reverb / Delay for Lush Lo-Fi sound
        const delay = audioCtx.createDelay();
        delay.delayTime.value = 0.33; // Tempo synced roughly
        const feedback = audioCtx.createGain();
        feedback.gain.value = 0.2;
        const lowpass = audioCtx.createBiquadFilter();
        lowpass.type = 'lowpass'; lowpass.frequency.value = 1000;
        
        masterGain.connect(delay);
        delay.connect(lowpass); lowpass.connect(feedback); feedback.connect(delay);
        delay.connect(audioCtx.destination);
        masterGain.connect(audioCtx.destination);
        
        analyser = audioCtx.createAnalyser();
        masterGain.connect(analyser);
    }

    // --- SYNTHESIZERS ---

    // 1. FM Synthesizer: Rhodes Electric Piano (Beautiful, bell-like, soft)
    function playRhodes(freq, time, vol=0.3) {
        const carrier = audioCtx.createOscillator();
        const modulator = audioCtx.createOscillator();
        carrier.type = 'sine';
        modulator.type = 'sine';
        
        // Harmonic ratio
        carrier.frequency.value = freq;
        modulator.frequency.value = freq * 2;
        
        const modGain = audioCtx.createGain();
        modGain.gain.value = freq * 1.5; // Mod index (bell-like strike)
        
        modulator.connect(modGain);
        modGain.connect(carrier.frequency);
        
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(0, time);
        env.gain.linearRampToValueAtTime(vol, time + 0.05); // Soft attack
        env.gain.exponentialRampToValueAtTime(0.001, time + 2.5); // Long natural decay
        
        carrier.connect(env);
        env.connect(masterGain);
        
        carrier.start(time); carrier.stop(time + 3);
        modulator.start(time); modulator.stop(time + 3);
    }

    // 2. Deep Lo-Fi Sub Bass
    function playSubBass(freq, time) {
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle'; // Smooth bass
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 150; // Cut off highs for pure sub
        
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(0, time);
        env.gain.linearRampToValueAtTime(0.5, time + 0.1);
        env.gain.exponentialRampToValueAtTime(0.01, time + 1.5);
        
        osc.connect(filter); filter.connect(env); env.connect(masterGain);
        osc.frequency.value = freq;
        osc.start(time); osc.stop(time + 2);
    }

    // 3. Lo-Fi Drums (Kick & Hi-Hat)
    function playKick(time) {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(1, time);
        env.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
        
        osc.frequency.setValueAtTime(120, time);
        osc.frequency.exponentialRampToValueAtTime(40, time + 0.1); // Pitch drop
        
        osc.connect(env); env.connect(masterGain);
        osc.start(time); osc.stop(time + 0.3);
    }

    function playHat(time) {
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 8000;
        
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(0.1, time); // Quiet hat
        env.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
        
        noise.connect(filter); filter.connect(env); env.connect(masterGain);
        noise.start(time);
    }

    // --- SEQUENCER LOGIC ---
    document.getElementById('btn-play').addEventListener('click', () => {
        initAudio();
        document.getElementById('btn-play').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'inline-block';
        document.getElementById('vinyl').classList.add('spinning');
        
        const bpm = 80; // Lo-Fi tempo
        const stepDuration = 60 / bpm / 4; // 16th notes
        
        let step = 0;
        let chordIndex = 0;
        
        seqInterval = setInterval(() => {
            const time = audioCtx.currentTime + 0.1;
            
            // Pergerakan Chord per 1 Bar (16 steps)
            if (step % 16 === 0) {
                const chord = chords[chordIndex];
                document.getElementById('status-text').textContent = `Memainkan Harmoni Jazz Lapis ${chordIndex + 1}...`;
                
                // Play Sub Bass (Root note octave down)
                playSubBass(chord[0] / 2, time);
                
                // Play Rhodes Chord with slight humanized strum
                chord.forEach((note, i) => {
                    playRhodes(note, time + (i * 0.02), 0.2);
                });
                
                chordIndex = (chordIndex + 1) % chords.length;
            }
            
            // Drums (Boom-Bap style)
            if (step % 8 === 0) playKick(time); // Beat 1, 3
            if (step % 8 === 5) playKick(time); // Syncopated kick
            if (step % 4 === 0) playHat(time);  // 8th note hats
            if (step % 4 === 2 && Math.random() > 0.5) playHat(time); // Random ghost hats
            
            // Random Melody (Sparse)
            if (Math.random() > 0.85) {
                const randomNote = melodyScale[Math.floor(Math.random() * melodyScale.length)];
                playRhodes(randomNote, time, 0.15); // Softer volume
            }
            
            step = (step + 1) % 64; // Loop 4 bars
        }, stepDuration * 1000);
        
        drawVisualizer();
    });

    document.getElementById('btn-stop').addEventListener('click', () => {
        if(audioCtx) audioCtx.close();
        clearInterval(seqInterval);
        document.getElementById('btn-play').style.display = 'inline-block';
        document.getElementById('btn-stop').style.display = 'none';
        document.getElementById('vinyl').classList.remove('spinning');
        document.getElementById('status-text').textContent = '';
    });

    // --- VISUALIZER ---
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function drawVisualizer() {
        if(!analyser || audioCtx.state === 'closed') return;
        requestAnimationFrame(drawVisualizer);
        
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgba(139, 92, 246, 0.5)';
        ctx.beginPath();
        
        const sliceWidth = canvas.width * 1.0 / bufferLength;
        let x = 0;
        for(let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0;
            const y = (v * canvas.height/2) + (canvas.height/4);
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            x += sliceWidth;
        }
        ctx.stroke();
    }
</script>

</body>
</html>
